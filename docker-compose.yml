services:
  postgres:
    image: postgres:15-alpine
    container_name: payments_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: payments
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: payments_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: payments_api
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: payments
      DB_USER: postgres
      DB_PASSWORD: postgres
      RABBIT_HOST: rabbitmq
      RABBIT_PORT: 5672
      RABBIT_USER: guest
      RABBIT_PASSWORD: guest
      API_KEY: test-api-key-secret
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  consumer:
    build:
      context: .
      dockerfile: Dockerfile.consumer
    container_name: payments_consumer
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: payments
      DB_USER: postgres
      DB_PASSWORD: postgres
      RABBIT_HOST: rabbitmq
      RABBIT_PORT: 5672
      RABBIT_USER: guest
      RABBIT_PASSWORD: guest
      PAYMENT_SUCCESS_RATE: 0.9
      PAYMENT_PROCESSING_DELAY_MIN: 2
      PAYMENT_PROCESSING_DELAY_MAX: 5
      MAX_RETRIES: 3
      RETRY_BASE_DELAY: 1.0
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command: python -m app.consumers.payment_consumer

volumes:
  postgres_data:
  rabbitmq_data:
